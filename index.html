<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TM | Scanner Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        body { background: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; overscroll-behavior: none; }
        .mobile-input {
            background: #1a1a1a !important; border: 2px solid #333 !important; border-radius: 12px !important;
            height: 55px !important; font-size: 17px !important; color: #fff !important; padding: 0 15px !important;
        }
        .card { background: #0f0f0f; border: 1px solid #222; border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        .gold-btn {
            background: #FBBF24; color: #000; height: 60px; border-radius: 16px;
            font-weight: 900; font-size: 16px; width: 100%; display: flex; align-items: center; justify-content: center;
        }
        .scan-btn {
            background: #ffffff; color: #000; height: 50px; border-radius: 12px;
            font-weight: 800; font-size: 14px; width: 100%; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .master-only { display: none !important; }
        body.is-master .master-only { display: block !important; }
        #previewModal { display: none; position: fixed; inset: 0; background: white; z-index: 9999; color: black; }
    </style>
</head>
<body class="p-4 pb-32">

    <div id="loader" class="loading">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-yellow-500 mb-4"></div>
        <p class="text-yellow-500 font-bold uppercase tracking-widest text-sm">Читаю документ...</p>
    </div>

    <header class="flex justify-between items-center mb-6">
        <div id="secretTrigger" class="flex items-center gap-3">
            <div class="w-12 h-12 bg-[#FBBF24] rounded-xl flex items-center justify-center text-black font-black text-xl">TM</div>
            <h1 class="text-lg font-black tracking-tighter text-[#FBBF24]">TALAS MASTER</h1>
        </div>
    </header>

    <label class="scan-btn cursor-pointer">
        <span>📸 ЗАГРУЗИТЬ ФОТО ПРАЙСА</span>
        <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="processImage(this)">
    </label>

    <div id="list"></div>

    <button onclick="addItem()" class="master-only w-full border-2 border-dashed border-[#FBBF24] text-[#FBBF24] p-4 rounded-xl font-bold mb-6">
        + ДОБАВИТЬ ВРУЧНУЮ
    </button>

    <div class="fixed bottom-6 left-4 right-4 z-[100]">
        <button onclick="showPreview()" class="gold-btn shadow-2xl shadow-yellow-500/20">
            ОФОРМИТЬ PDF
        </button>
    </div>

    <div id="previewModal" class="overflow-auto p-4">
        <div class="flex gap-2 mb-6 no-print">
            <button onclick="closePreview()" class="flex-1 bg-gray-200 p-4 rounded-xl font-bold">НАЗАД</button>
            <button onclick="downloadPDF()" class="flex-1 bg-black text-white p-4 rounded-xl font-bold">СКАЧАТЬ</button>
        </div>
        <div id="pdfContent" class="p-2">
            <h1 style="font-size: 24px; font-weight: 900; border-bottom: 3px solid #000; padding-bottom: 5px;">TALAS_MASTER</h1>
            <p style="font-size: 12px; margin-bottom: 20px;">ЭЛЕКТРОМОНТАЖ | +996 755 000 228</p>
            <div id="pdfTable"></div>
        </div>
    </div>

    <script>
        let isMaster = false;
        let clicks = 0;

        // Вход в режим мастера
        document.getElementById('secretTrigger').onclick = () => {
            clicks++;
            if (clicks >= 5) {
                isMaster = !isMaster;
                document.body.classList.toggle('is-master', isMaster);
                alert(isMaster ? "РЕЖИМ РЕДАКТИРОВАНИЯ" : "РЕЖИМ КЛИЕНТА");
                clicks = 0;
            }
        };

        // ФУНКЦИЯ ОБРАБОТКИ ИЗОБРАЖЕНИЯ (OCR)
        async function processImage(input) {
            if (!input.files || !input.files[0]) return;
            
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            try {
                const result = await Tesseract.recognize(input.files[0], 'rus+eng');
                const lines = result.data.text.split('\n');
                
                lines.forEach(line => {
                    // Ищем строки, где есть текст и цифры (похоже на услугу)
                    const priceMatch = line.match(/(\d[\d\s]{2,})/); // Ищем число от 100 и выше
                    if (line.trim().length > 5 && priceMatch) {
                        const name = line.replace(priceMatch[0], '').trim().replace(/[^\w\sа-яА-ЯёЁ]/gi, '');
                        const price = priceMatch[0].replace(/\s/g, '');
                        if (name.length > 2) addItem(name, price);
                    }
                });
            } catch (e) {
                alert("Ошибка распознавания. Попробуйте более четкое фото.");
            } finally {
                loader.style.display = 'none';
                input.value = ''; // Сброс инпута
            }
        }

        function addItem(name = "", price = 0) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <input type="text" class="mobile-input w-full font-bold mb-3 item-name" value="${name}" placeholder="Услуга" ${isMaster ? '' : 'readonly'}>
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="text-[9px] text-gray-500 font-bold block ml-1">ПРАЙС</label>
                        <input type="number" class="mobile-input w-full price-m text-yellow-500" value="${price}" ${isMaster ? '' : 'disabled'}>
                    </div>
                    <div class="flex-1">
                        <label class="text-[9px] text-yellow-500 font-bold block ml-1">ИТОГО</label>
                        <input type="number" class="mobile-input w-full price-client border-yellow-500/50" placeholder="0">
                    </div>
                </div>
            `;
            document.getElementById('list').prepend(div); // Добавляем наверх
        }

        function showPreview() {
            const pdfTable = document.getElementById('pdfTable');
            pdfTable.innerHTML = '';
            let total = 0;
            document.querySelectorAll('.card').forEach((card, i) => {
                const name = card.querySelector('.item-name').value;
                const pC = card.querySelector('.price-client').value || 0;
                if (!name) return;
                total += parseFloat(pC);
                pdfTable.innerHTML += `<div style="padding: 8px 0; border-bottom: 1px solid #ddd; font-size: 14px;">
                    <b>${i+1}. ${name.toUpperCase()}</b> <br> <span style="color: #666;">Стоимость: ${pC} сом</span>
                </div>`;
            });
            pdfTable.innerHTML += `<div style="font-size: 22px; font-weight: 900; margin-top: 20px; text-align: right;">ИТОГО: ${total} сом</div>`;
            document.getElementById('previewModal').style.display = 'block';
        }

        function closePreview() { document.getElementById('previewModal').style.display = 'none'; }
        
        function downloadPDF() {
            const opt = { margin: 10, filename: 'TalasMaster_Check.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } };
            html2pdf().from(document.getElementById('pdfContent')).set(opt).save();
        }
    </script>
</body>
</html>
