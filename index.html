<header class="tp-header">
    <style>
        /* Общие стили шапки */
        .tp-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #000000;
            border-bottom: 2px solid #111111;
            z-index: 1000;
            font-family: 'Arial', sans-serif;
        }

        .tp-nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between; /* Раскидывает элементы по краям */
            align-items: center;
        }

        /* ЛЕВАЯ ЧАСТЬ: Логотип */
        .tp-logo {
            font-size: 24px;
            font-weight: 900;
            color: #FBBF24;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1; /* Дает одинаковую ширину для баланса */
        }

        .tp-logo::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #FBBF24;
            transform: rotate(45deg);
        }

        /* ЦЕНТРАЛЬНАЯ ЧАСТЬ: Меню + Языки */
        .tp-center-group {
            display: flex;
            align-items: center;
            gap: 40px;
            justify-content: center;
            flex: 2; /* Занимает больше места по центру */
        }

        .tp-nav-menu {
            display: flex;
            list-style: none;
            gap: 30px;
            margin: 0;
            padding: 0;
            align-items: center;
        }

        .tp-nav-link {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            padding: 5px 0;
            transition: color 0.3s ease;
        }

        .tp-nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #FBBF24;
            transition: width 0.3s ease;
        }

        .tp-nav-link:hover::after {
            width: 100%;
        }

        .tp-nav-link:hover {
            color: #FBBF24;
        }

        /* --- ВЫПАДАЮЩЕЕ МЕНЮ (DROPDOWN) --- */
        .tp-dropdown {
            position: relative;
        }

        .tp-dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background-color: #111111;
            border: 1px solid #222222;
            list-style: none;
            padding: 15px 0;
            margin: 0;
            width: 220px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .tp-dropdown:hover .tp-dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .tp-dropdown-menu li a {
            color: #AAAAAA;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
            padding: 10px 20px;
            transition: all 0.3s ease;
        }

        .tp-dropdown-menu li a:hover {
            color: #FBBF24;
            background-color: #050505;
            padding-left: 25px;
        }

        /* ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКОВ (ЯРКИЙ ПО ЦЕНТРУ) */
        .tp-lang-switch {
            display: flex;
            gap: 8px;
            font-size: 16px; /* Сделали крупнее */
            font-weight: 900;
            border-left: 1px solid #333333; /* Отделили черточкой */
            padding-left: 20px;
        }

        .tp-lang-switch a {
            color: #666666;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .tp-lang-switch a.active {
            color: #FBBF24; /* Активный горит золотом */
            border-bottom: 2px solid #FBBF24;
        }

        .tp-lang-switch a:hover {
            color: #FFFFFF;
        }

        /* ПРАВАЯ ЧАСТЬ: Номер телефона */
        .tp-phone-wrapper {
            display: flex;
            justify-content: flex-end;
            flex: 1;
        }

        .tp-phone {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            border: 1px solid #333333;
            padding: 10px 20px;
            border-radius: 4px;
        }

        /* Трубка телефона перед номером */
        .tp-phone::before {
            content: '📞';
            font-size: 14px;
        }

        .tp-phone:hover {
            color: #000000;
            background-color: #FBBF24;
            border-color: #FBBF24;
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.2);
        }

        /* МОБИЛЬНАЯ ИКОНКА (ГАМБУРГЕР) */
        .tp-burger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .tp-burger span {
            display: block;
            width: 25px;
            height: 2px;
            background-color: #FFFFFF;
            transition: all 0.3s ease;
        }

        /* АДАПТИВНОСТЬ */
        @media screen and (max-width: 1024px) {
            .tp-center-group {
                display: none; /* Прячем меню и языки на планшетах/мобилках */
            }

            .tp-phone-wrapper {
                display: none; /* Прячем номер */
            }

            .tp-burger {
                display: flex; /* Показываем гамбургер */
            }
        }
    </style>

    <div class="tp-nav-container">
        
        <a href="#" class="tp-logo">Talas_profi</a>

        <div class="tp-center-group">
            <ul class="tp-nav-menu">
                <li><a href="#" class="tp-nav-link">Главная</a></li>
                
                <li class="tp-dropdown">
                    <a href="#services" class="tp-nav-link">Услуги ▾</a>
                    <ul class="tp-dropdown-menu">
                        <li><a href="#">Электромонтаж</a></li>
                        <li><a href="#">Сантехника</a></li>
                        <li><a href="#">Демонтаж</a></li>
                        <li><a href="#">Видеонаблюдение</a></li>
                    </ul>
                </li>

                <li><a href="#portfolio" class="tp-nav-link">Портфолио</a></li>
                <li><a href="#contacts" class="tp-nav-link">Контакты</a></li>
            </ul>

            <div class="tp-lang-switch">
                <a href="#" class="active">RU</a>
                <span style="color: #444;">/</span>
                <a href="#">KG</a>
            </div>
        </div>

        <div class="tp-phone-wrapper">
            <a href="tel:+996755000228" class="tp-phone">+996 755 000 228</a>
        </div>

        <button class="tp-burger" onclick="alert('Для открытия меню на мобилках добавь пару строк JS!')">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</header>
